# Les fichiers uploadés vivent hors de la racine web (/var/www/data/uploads).
# On les expose sous l'URL /uploads via un alias, et on interdit toute
# exécution de code dans ce dossier.
Alias /uploads /var/www/data/uploads

<Directory /var/www/data/uploads>
    Require all granted
    php_admin_flag engine off
    Options -ExecCGI -Indexes
    AddType text/plain .php .phtml .php3 .php4 .php5 .pl .py .cgi .sh
</Directory>