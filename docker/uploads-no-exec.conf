# Empêche l'exécution de tout code dans le dossier des fichiers uploadés.
# Sécurité essentielle : sans ça, un .php déposé via le formulaire pourrait
# être exécuté par le serveur.
<Directory /var/www/html/uploads>
    php_admin_flag engine off
    Options -ExecCGI -Indexes
    AddType text/plain .php .phtml .php3 .php4 .php5 .pl .py .cgi .sh
</Directory>
