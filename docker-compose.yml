services:
  slideshow:
    build: .
    ports:
      - "8080:80"
    environment:
      # Mot de passe du back-office : à changer, et idéalement à sortir
      # dans un fichier .env non versionné (voir README).
      ADMIN_PASSWORD: "change-me"
    volumes:
      # DONNÉES PERSISTANTES : un seul dossier monté, hors de la racine web.
      # (Monter un DOSSIER évite le piège du fichier que Docker transforme en
      #  répertoire s'il n'existe pas encore côté hôte.)
      - ./data:/var/www/data
    restart: unless-stopped